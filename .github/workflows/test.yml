name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Plugin unit tests — same glob as the CLAUDE.md release gate.
      # Pure / --dry-run: no codex, gh, or network needed.
      - name: Unit tests (plugin)
        run: node --test tests/*.mjs

      # Repo-local skill-helper tests (cc-/codex-changelog), run as a SEPARATE
      # invocation on purpose: mixing them into the plugin glob perturbs the
      # parallel scheduler and trips a latent race in the mock-codex tests.
      - name: Unit tests (skill helpers)
        run: >
          node --test
          .claude/skills/cc-changelog/get-changelog.test.mjs
          .claude/skills/codex-changelog/get-releases.test.mjs

      # Acceptance smoke: dry-run bridge JSON, manifest, hooks, file structure.
      # Codex/claude capability probes self-skip when those binaries are absent.
      - name: Smoke test
        run: bash scripts/test/smoke.sh
